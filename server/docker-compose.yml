services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DB_HOST=chromadb
      - DB_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      chromadb:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:1.0.12
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  chroma_data:
